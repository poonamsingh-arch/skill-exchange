<body>

<h1 style="text-align:center;">🚀 Skill Exchange Platform</h1>

<div class="container">

  <!-- AUTH -->

  <div class="box">
    <h2>Signup</h2>
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">
    <button onclick="signup()">Signup</button>

```
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" placeholder="Password">
<button onclick="login()">Login</button>
```

  </div>

  <!-- SKILLS -->

  <div class="box">
    <h2>Add Skill</h2>
    <input id="skill" placeholder="Skill name">
    <select id="type">
      <option value="teach">Teach</option>
      <option value="learn">Learn</option>
    </select>
    <button onclick="addSkill()">Add Skill</button>

```
<h2>Skills</h2>
<ul id="skills"></ul>
```

  </div>

  <!-- CHAT -->

  <div class="box" style="grid-column: span 2;">
    <h2>Live Chat 💬</h2>
    <div id="chatBox">
      <ul id="chat"></ul>
    </div>
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const API = "https://skill-backend-ul3j.onrender.com";
let token = "";

let currentUser = "";   // ✅ ADD THIS LINE


  

// Signup
async function signup() {
  await fetch(API + "/auth/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      password: password.value
    })
  });
  alert("Signup successful!");
}

// Login


async function login() {
  const res = await fetch(API + "/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: loginEmail.value,
      password: loginPassword.value
    })
  });

  const data = await res.json();
  token = data.token;

  // ✅ ask user name manually (simple fix)
  currentUser = prompt("Enter your name:");

  alert("Login successful!");
}

  








function send() {

  const message = {
    text: msg.value,
    username: currentUser,
    sender: currentUser
  };

  socket.emit("sendMessage", message);
  msg.value = "";
}

  





  






  

// Add Skill
async function addSkill() {
  await fetch(API + "/skills", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      name: skill.value,
      type: type.value
    })
  });

  loadSkills();
}

// Load Skills
async function loadSkills() {
  const res = await fetch(API + "/skills");
  const data = await res.json();

  skills.innerHTML = "";
  data.forEach(s => {





skills.innerHTML += `
  <li>

skillname: ${s.name} (${s.type})




    <button onclick="updateSkill('${s._id}')">Update</button>
    <button onclick="deleteSkill('${s._id}')">Delete</button>
  </li>
`;






    
    
    
  });
}

// Load Messages
async function loadMessages() {
  const res = await fetch(API + "/messages");
  const data = await res.json();

  chat.innerHTML = "";

data.forEach(m => {

chat.innerHTML += `
  <li>
    <b>${m.username}</b> 
    (${m.sender}) :
    ${m.text}
  </li>`;





  
});

  
}

loadSkills();
loadMessages();

// SOCKET.IO
const socket = io(API);











  
  


socket.on("receiveMessage", (m) => {

chat.innerHTML += `
  <li>
    <b>${m.username}</b> 
    (${m.sender}) :
    ${m.text}
  </li>`;








  
});
  



  

async function deleteSkill(id) {
  await fetch(API + "/skills/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": token
    }
  });

  loadSkills();
}  




async function updateSkill(id) {
  const newName = prompt("Enter new skill name");

  if (!newName) {
    alert("No input given!");
    return;
  }

  await fetch(API + "/skills/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ name: newName })
  });

  alert("Updated successfully!");
  loadSkills();
}





  

  





</script>

</body>
</html>
